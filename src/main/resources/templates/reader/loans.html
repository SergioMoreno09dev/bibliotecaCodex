<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Mis préstamos')}"></head>

<body>

<div class="app-shell">

    <nav th:replace="~{fragments/nav :: sidebar('loans','reader')}"></nav>

    <main class="app-content p-3 p-lg-4">

        <h1 class="view-title mb-4">
            Mis préstamos
        </h1>

        <div class="alert alert-info"
             th:if="${flash != null}"
             th:text="${flash}">
        </div>

        <section class="bg-white border rounded-3">

            <div class="table-responsive">

                <table class="table table-striped mb-0">

                    <thead>

                    <tr>
                        <th>ID</th>
                        <th>Libro</th>
                        <th>Préstamo</th>
                        <th>Devolución</th>
                        <th>Estado</th>
                        <th class="text-end">Acciones</th>
                    </tr>

                    </thead>

                    <tbody>

                    <tr th:each="loan : ${loans}"
                        th:classappend="${loan.status == 'VENCIDO' or loan.status == 'EXPIRADO'} ? ' row-expired'">

                        <td th:text="${loan.id}"></td>

                        <td th:text="${loan.book?.title}"></td>

                        <td th:text="${loan.loanDate != null ? #dates.format(loan.loanDate,'yyyy-MM-dd') : ''}"></td>

                        <td th:text="${loan.returnDate != null ? #dates.format(loan.returnDate,'yyyy-MM-dd') : ''}"></td>

                        <td>

                                    <span class="badge"
                                          th:classappend="${loan.status == 'VENCIDO' or loan.status == 'EXPIRADO' ? ' text-bg-danger' : loan.status == 'ACTIVO' ? ' text-bg-success' : ' text-bg-secondary'}"
                                          th:text="${loan.status}">
                                    </span>

                        </td>

                        <td class="text-end">

                            <form th:action="@{/reader/loans/extend}"
                                  method="post">

                                <input type="hidden"
                                       th:if="${_csrf != null}"
                                       th:name="${_csrf.parameterName}"
                                       th:value="${_csrf.token}">

                                <input type="hidden"
                                       name="id"
                                       th:value="${loan.id}">

                                <button class="btn btn-sm btn-outline-primary"
                                        type="submit">

                                    <i class="bi bi-calendar-plus"></i>

                                </button>

                            </form>

                        </td>

                    </tr>

                    <tr th:if="${#lists.isEmpty(loans)}">

                        <td colspan="6"
                            class="text-center text-secondary py-4">
                            No tienes préstamos registrados.
                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </section>

    </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script th:src="@{/assets/js/codexlibrary.js}"
        src="/assets/js/codexlibrary.js">
</script>

</body>
</html>
