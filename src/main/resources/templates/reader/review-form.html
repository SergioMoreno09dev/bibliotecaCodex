<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Nueva reseña')}"></head>

<body>

<div class="app-shell">

    <nav th:replace="~{fragments/nav :: sidebar('catalog','reader')}"></nav>

    <main class="app-content p-3 p-lg-4">

        <h1 class="view-title mb-4">
            Nueva reseña
        </h1>

        <section class="bg-white border rounded-3 p-3">

            <form th:action="@{/reader/reviews/save}"
                  method="post"
                  class="needs-validation"
                  data-validate="true"
                  novalidate>

                <input type="hidden"
                       th:if="${_csrf != null}"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">

                <input type="hidden"
                       name="isbn"
                       th:value="${isbn}">

                <div class="row g-3">

                    <div class="col-12 col-md-3">

                        <label class="form-label">
                            Calificación
                        </label>

                        <select class="form-select"
                                name="rating"
                                required>

                            <option value="5">5</option>
                            <option value="4">4</option>
                            <option value="3">3</option>
                            <option value="2">2</option>
                            <option value="1">1</option>

                        </select>

                    </div>

                    <div class="col-12">

                        <label class="form-label">
                            Comentario
                        </label>

                        <textarea class="form-control"
                                  name="comment"
                                  rows="5"
                                  required>
                            </textarea>

                    </div>

                </div>

                <button class="btn btn-primary mt-3"
                        type="submit">

                    <i class="bi bi-send me-1"></i>
                    Publicar

                </button>

            </form>

        </section>

    </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script th:src="@{/assets/js/codexlibrary.js}"
        src="/assets/js/codexlibrary.js">
</script>

</body>
</html>
