<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Mis reservas')}"></head>

<body>

<div class="app-shell">

    <nav th:replace="~{fragments/nav :: sidebar('orders','reader')}"></nav>

    <main class="app-content p-3 p-lg-4">

        <h1 class="view-title mb-4">
            Mis reservas
        </h1>

        <div class="alert alert-info"
             th:if="${flash != null}"
             th:text="${flash}">
        </div>

        <section class="bg-white border rounded-3">

            <div class="table-responsive">

                <table class="table table-striped mb-0">

                    <thead>

                    <tr>
                        <th>ID</th>
                        <th>Libro</th>
                        <th>Solicitud</th>
                        <th>Expira</th>
                        <th>Estado</th>
                        <th class="text-end">Acciones</th>
                    </tr>

                    </thead>

                    <tbody>

                    <tr th:each="order : ${orders}"
                        th:classappend="${order.status == 'VENCIDA' or order.status == 'EXPIRADA'} ? ' row-expired'">

                        <td th:text="${order.id}"></td>

                        <td th:text="${order.book?.title}"></td>

                        <td th:text="${order.orderDate != null ? #dates.format(order.orderDate,'yyyy-MM-dd') : ''}"></td>

                        <td th:text="${order.expirationDate != null ? #dates.format(order.expirationDate,'yyyy-MM-dd') : ''}"></td>

                        <td>

                                    <span class="badge"
                                          th:classappend="${order.status == 'APROBADA' ? ' text-bg-success' : (order.status == 'VENCIDA' or order.status == 'EXPIRADA') ? ' text-bg-danger' : ' text-bg-warning'}"
                                          th:text="${order.status}">
                                    </span>

                        </td>

                        <td class="text-end">

                            <form th:action="@{/reader/orders/cancel}"
                                  method="post">

                                <input type="hidden"
                                       th:if="${_csrf != null}"
                                       th:name="${_csrf.parameterName}"
                                       th:value="${_csrf.token}">

                                <input type="hidden"
                                       name="id"
                                       th:value="${order.id}">

                                <button class="btn btn-sm btn-outline-danger"
                                        type="submit"
                                        data-confirm="¿Cancelar esta reserva?">

                                    <i class="bi bi-x-lg"></i>

                                </button>

                            </form>

                        </td>

                    </tr>

                    <tr th:if="${#lists.isEmpty(orders)}">

                        <td colspan="6"
                            class="text-center text-secondary py-4">
                            No tienes reservas registradas.
                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </section>

    </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script th:src="@{/assets/js/codexlibrary.js}"
        src="/assets/js/codexlibrary.js">
</script>

</body>
</html>
