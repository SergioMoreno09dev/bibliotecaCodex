<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Mis multas')}"></head>

<body>

<div class="app-shell">

    <nav th:replace="~{fragments/nav :: sidebar('fines','reader')}"></nav>

    <main class="app-content p-3 p-lg-4">

        <h1 class="view-title mb-4">
            Mis multas
        </h1>

        <div class="alert alert-info"
             th:if="${flash != null}"
             th:text="${flash}">
        </div>

        <section class="bg-white border rounded-3">

            <div class="table-responsive">

                <table class="table table-striped mb-0">

                    <thead>

                    <tr>
                        <th>ID</th>
                        <th>Préstamo</th>
                        <th>Fecha</th>
                        <th>Valor</th>
                        <th>Estado</th>
                        <th class="text-end">Acciones</th>
                    </tr>

                    </thead>

                    <tbody>

                    <tr th:each="fine : ${fines}">

                        <td th:text="${fine.id}"></td>

                        <td>

                            <span th:text="${'#' + fine.loan?.id}"></span>
                            -
                            <span th:text="${fine.loan?.book?.title}"></span>

                        </td>

                        <td th:text="${fine.generateDate != null ? #dates.format(fine.generateDate,'yyyy-MM-dd') : ''}"></td>

                        <td th:text="${#numbers.formatDecimal(fine.amount,1,2)}"></td>

                        <td>

                                    <span class="badge"
                                          th:classappend="${fine.status == 'PAGADA' ? ' text-bg-success' : ' text-bg-warning'}"
                                          th:text="${fine.status}">
                                    </span>

                        </td>

                        <td class="text-end">

                            <form th:action="@{/reader/fines/pay}"
                                  method="post">

                                <input type="hidden"
                                       th:if="${_csrf != null}"
                                       th:name="${_csrf.parameterName}"
                                       th:value="${_csrf.token}">

                                <input type="hidden"
                                       name="id"
                                       th:value="${fine.id}">

                                <button class="btn btn-sm btn-outline-success"
                                        type="submit">

                                    <i class="bi bi-credit-card"></i>

                                </button>

                            </form>

                        </td>

                    </tr>

                    <tr th:if="${#lists.isEmpty(fines)}">

                        <td colspan="6"
                            class="text-center text-secondary py-4">
                            No tienes multas registradas.
                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </section>

    </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script th:src="@{/assets/js/codexlibrary.js}"
        src="/assets/js/codexlibrary.js">
</script>

</body>
</html>
