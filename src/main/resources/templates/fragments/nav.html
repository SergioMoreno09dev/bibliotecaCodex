<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<nav th:fragment="sidebar(active, role)"
     class="app-sidebar navbar navbar-expand-lg align-items-start p-3">

    <div class="container-fluid d-lg-block p-0">

        <a class="navbar-brand fw-semibold"
           th:href="${role == 'reader'} ? @{/reader/catalog} : @{/dashboard}">

            <i class="bi bi-journal-bookmark me-2"
               aria-hidden="true">
            </i>

            CodexLibrary

        </a>

        <button class="navbar-toggler bg-light"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#mainNav"
                aria-controls="mainNav"
                aria-expanded="false"
                aria-label="Abrir navegación">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse d-lg-block mt-3"
             id="mainNav">

            <div class="nav nav-pills flex-column gap-1"
                 th:if="${role == 'admin'}">

                <a class="nav-link"
                   th:classappend="${active == 'dashboard'} ? ' active'"
                   th:href="@{/dashboard}">

                    <i class="bi bi-speedometer2 me-2"></i>
                    Panel

                </a>

                <a class="nav-link"
                   th:classappend="${active == 'books'} ? ' active'"
                   th:href="@{/admin/books}">

                    <i class="bi bi-book me-2"></i>
                    Libros

                </a>

                <a class="nav-link"
                   th:classappend="${active == 'authors'} ? ' active'"
                   th:href="@{/admin/authors}">

                    <i class="bi bi-pen me-2"></i>
                    Autores

                </a>

                <a class="nav-link"
                   th:classappend="${active == 'categories'} ? ' active'"
                   th:href="@{/admin/categories}">

                    <i class="bi bi-tags me-2"></i>
                    Categorías

                </a>

                <a class="nav-link"
                   th:classappend="${active == 'publishers'} ? ' active'"
                   th:href="@{/admin/publishers}">

                    <i class="bi bi-building me-2"></i>
                    Editoriales

                </a>

                <a class="nav-link"
                   th:classappend="${active == 'loans'} ? ' active'"
                   th:href="@{/admin/loans}">

                    <i class="bi bi-arrow-left-right me-2"></i>
                    Préstamos

                </a>

                <a class="nav-link"
                   th:classappend="${active == 'orders'} ? ' active'"
                   th:href="@{/admin/orders}">

                    <i class="bi bi-bookmark-check me-2"></i>
                    Reservas

                </a>

                <a class="nav-link"
                   th:classappend="${active == 'fines'} ? ' active'"
                   th:href="@{/admin/fines}">

                    <i class="bi bi-cash-coin me-2"></i>
                    Multas

                </a>

                <a class="nav-link"
                   th:classappend="${active == 'users'} ? ' active'"
                   th:href="@{/admin/users}">

                    <i class="bi bi-people me-2"></i>
                    Usuarios

                </a>

                <a class="nav-link"
                   th:classappend="${active == 'reviews'} ? ' active'"
                   th:href="@{/admin/reviews}">

                    <i class="bi bi-star me-2"></i>
                    Reseñas

                </a>

                <a class="nav-link"
                   th:classappend="${active == 'notifications'} ? ' active'"
                   th:href="@{/admin/notifications}">

                    <i class="bi bi-bell me-2"></i>
                    Notificaciones

                </a>

                <a class="nav-link"
                   th:classappend="${active == 'reports'} ? ' active'"
                   th:href="@{/admin/reports}">

                    <i class="bi bi-file-earmark-bar-graph me-2"></i>
                    Reportes

                </a>

                <a class="nav-link"
                   th:classappend="${active == 'permissions'} ? ' active'"
                   th:href="@{/admin/permissions}">

                    <i class="bi bi-shield-lock me-2"></i>
                    Permisos

                </a>

                <a class="nav-link"
                   th:classappend="${active == 'audit'} ? ' active'"
                   th:href="@{/admin/audit-logs}">

                    <i class="bi bi-clipboard-data me-2"></i>
                    Auditoría

                </a>

            </div>

            <div class="nav nav-pills flex-column gap-1"
                 th:if="${role == 'reader'}">

                <a class="nav-link"
                   th:classappend="${active == 'catalog'} ? ' active'"
                   th:href="@{/reader/catalog}">

                    <i class="bi bi-search me-2"></i>
                    Catálogo

                </a>

                <a class="nav-link"
                   th:classappend="${active == 'loans'} ? ' active'"
                   th:href="@{/reader/loans}">

                    <i class="bi bi-arrow-left-right me-2"></i>
                    Mis préstamos

                </a>

                <a class="nav-link"
                   th:classappend="${active == 'orders'} ? ' active'"
                   th:href="@{/reader/orders}">

                    <i class="bi bi-bookmark-check me-2"></i>
                    Mis reservas

                </a>

                <a class="nav-link"
                   th:classappend="${active == 'fines'} ? ' active'"
                   th:href="@{/reader/fines}">

                    <i class="bi bi-cash-coin me-2"></i>
                    Mis multas

                </a>

                <a class="nav-link"
                   th:classappend="${active == 'notifications'} ? ' active'"
                   th:href="@{/reader/notifications}">

                    <i class="bi bi-bell me-2"></i>
                    Notificaciones

                </a>

            </div>

            <form th:action="@{/logout}"
                  method="post"
                  class="mt-3">

                <input type="hidden"
                       th:if="${_csrf != null}"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">

                <button class="btn btn-outline-light w-100"
                        type="submit">

                    <i class="bi bi-box-arrow-right me-2"></i>
                    Cerrar sesi&oacute;n

                </button>

            </form>

        </div>

    </div>

</nav>

</html>
