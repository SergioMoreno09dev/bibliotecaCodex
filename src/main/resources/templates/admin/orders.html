<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Reservas')}"></head>
<body>
<div class="app-shell">
    <nav th:replace="~{fragments/nav :: sidebar('orders','admin')}"></nav>

    <main class="app-content p-3 p-lg-4">

        <h1 class="view-title mb-4">Reservas</h1>

        <div class="alert alert-info"
             th:if="${flash != null}"
             th:text="${flash}">
        </div>

        <section class="bg-white border rounded-3 p-3 mb-4">

            <form th:action="@{/admin/orders/create}"
                  method="post"
                  class="needs-validation"
                  data-validate="true"
                  novalidate>

                <input type="hidden"
                       th:if="${_csrf != null}"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">

                <div class="row g-3 align-items-end">

                    <div class="col-12 col-md-5">

                        <label class="form-label">
                            Lector
                        </label>

                        <select class="form-select"
                                name="userId"
                                required>

                            <option value="">
                                Selecciona un lector
                            </option>

                            <option th:each="user : ${users}"
                                    th:value="${user.id}"
                                    th:text="${user.name}">
                            </option>

                        </select>

                    </div>

                    <div class="col-12 col-md-5">

                        <label class="form-label">
                            Libro
                        </label>

                        <select class="form-select"
                                name="isbn"
                                required>

                            <option value="">
                                Selecciona un libro
                            </option>

                            <option th:each="book : ${books}"
                                    th:value="${book.isbn}"
                                    th:text="${book.title}">
                            </option>

                        </select>

                    </div>

                    <div class="col-12 col-md-2">

                        <button class="btn btn-primary w-100" type="submit">
                            <i class="bi bi-plus-lg me-1"></i>
                            Crear
                        </button>

                    </div>

                </div>

            </form>

        </section>

        <section class="bg-white border rounded-3">

            <div class="table-responsive">

                <table class="table table-striped mb-0">

                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Lector</th>
                        <th>Libro</th>
                        <th>Solicitud</th>
                        <th>Expira</th>
                        <th>Estado</th>
                        <th class="text-end">Acciones</th>
                    </tr>
                    </thead>

                    <tbody>

                    <tr th:each="order : ${orders}"
                        th:classappend="${order.status == 'VENCIDA' or order.status == 'EXPIRADA'} ? ' row-expired'">

                        <td th:text="${order.id}"></td>

                        <td th:text="${order.user?.name}"></td>

                        <td th:text="${order.book?.title}"></td>

                        <td th:text="${order.orderDate != null ? #dates.format(order.orderDate,'yyyy-MM-dd') : ''}"></td>

                        <td th:text="${order.expirationDate != null ? #dates.format(order.expirationDate,'yyyy-MM-dd') : ''}"></td>

                        <td>

                                    <span class="badge"
                                          th:classappend="${order.status == 'APROBADA' ? ' text-bg-success' : (order.status == 'VENCIDA' or order.status == 'EXPIRADA') ? ' text-bg-danger' : ' text-bg-warning'}"
                                          th:text="${order.status}">
                                    </span>

                        </td>

                        <td class="text-end">

                            <form class="d-inline"
                                  th:action="@{/admin/orders/approve}"
                                  method="post">

                                <input type="hidden"
                                       th:if="${_csrf != null}"
                                       th:name="${_csrf.parameterName}"
                                       th:value="${_csrf.token}">

                                <input type="hidden"
                                       name="id"
                                       th:value="${order.id}">

                                <button class="btn btn-sm btn-outline-success"
                                        type="submit">
                                    <i class="bi bi-check2"></i>
                                </button>

                            </form>

                            <form class="d-inline"
                                  th:action="@{/admin/orders/cancel}"
                                  method="post">

                                <input type="hidden"
                                       th:if="${_csrf != null}"
                                       th:name="${_csrf.parameterName}"
                                       th:value="${_csrf.token}">

                                <input type="hidden"
                                       name="id"
                                       th:value="${order.id}">

                                <button class="btn btn-sm btn-outline-danger"
                                        type="submit">
                                    <i class="bi bi-x-lg"></i>
                                </button>

                            </form>

                        </td>

                    </tr>

                    <tr th:if="${#lists.isEmpty(orders)}">

                        <td colspan="7"
                            class="text-center text-secondary py-4">
                            No hay reservas registradas.
                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </section>

    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script th:src="@{/assets/js/codexlibrary.js}"
        src="/assets/js/codexlibrary.js">
</script>

</body>
</html>
