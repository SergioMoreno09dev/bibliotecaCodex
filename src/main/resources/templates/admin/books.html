<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Libros')}"></head>
<body>
<div class="app-shell">
    <nav th:replace="~{fragments/nav :: sidebar('books','admin')}"></nav>

    <main class="app-content p-3 p-lg-4">

        <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
            <div>
                <h1 class="view-title mb-1">Gestión de libros</h1>
                <p class="text-secondary mb-0">Catálogo bibliográfico y disponibilidad</p>
            </div>

            <form class="d-flex gap-2"
                  th:action="@{/admin/books}"
                  method="get">

                <input class="form-control"
                       type="search"
                       name="term"
                       th:value="${param.term}"
                       placeholder="Buscar título o ISBN">

                <button class="btn btn-outline-primary" type="submit">
                    <i class="bi bi-search"></i>
                </button>

            </form>
        </div>

        <div class="alert alert-info"
             th:if="${flash != null}"
             th:text="${flash}">
        </div>

        <section class="bg-white border rounded-3 p-3 mb-4">

            <h2 class="h5 mb-3"
                th:text="${book?.isbn == null ? 'Registrar libro' : 'Editar libro'}">
                Registrar libro
            </h2>

            <form th:action="@{/admin/books/save}"
                  method="post"
                  class="needs-validation"
                  data-validate="true"
                  novalidate>

                <input type="hidden"
                       th:if="${_csrf != null}"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">

                <div class="row g-3">

                    <div class="col-12 col-md-4">
                        <label class="form-label" for="isbn">ISBN</label>

                        <input class="form-control"
                               id="isbn"
                               name="isbn"
                               th:value="${book?.isbn}"
                               required>

                        <div class="invalid-feedback">
                            El ISBN es obligatorio.
                        </div>

                        <div class="text-danger small form-error"
                             th:text="${errors?.isbn}">
                        </div>
                    </div>

                    <div class="col-12 col-md-8">
                        <label class="form-label" for="title">Título</label>

                        <input class="form-control"
                               id="title"
                               name="title"
                               th:value="${book?.title}"
                               required>

                        <div class="invalid-feedback">
                            El título es obligatorio.
                        </div>

                        <div class="text-danger small form-error"
                             th:text="${errors?.title}">
                        </div>
                    </div>

                    <div class="col-6 col-md-2">
                        <label class="form-label" for="stock">Stock</label>

                        <input class="form-control"
                               id="stock"
                               name="stock"
                               type="number"
                               min="0"
                               th:value="${book?.stock ?: 0}"
                               required>
                    </div>

                    <div class="col-6 col-md-3">
                        <label class="form-label" for="language">Idioma</label>

                        <input class="form-control"
                               id="language"
                               name="language"
                               th:value="${book?.language}"
                               required>
                    </div>

                    <div class="col-6 col-md-2">
                        <label class="form-label" for="year">Publicación</label>

                        <input class="form-control"
                               id="year"
                               name="year"
                               type="date"
                               th:value="${book?.year != null ? #dates.format(book.year,'yyyy-MM-dd') : ''}">
                    </div>

                    <div class="col-6 col-md-2">
                        <label class="form-label" for="type">Tipo</label>

                        <input class="form-control"
                               id="type"
                               name="type"
                               th:value="${book?.type}">
                    </div>

                    <div class="col-6 col-md-3">
                        <label class="form-label" for="cantPage">Páginas</label>

                        <input class="form-control"
                               id="cantPage"
                               name="cantPage"
                               th:value="${book?.cantPage}">
                    </div>

                    <div class="col-12 col-md-4">
                        <label class="form-label" for="publisherId">Editorial</label>

                        <select class="form-select"
                                id="publisherId"
                                name="publisherId">

                            <option value="">
                                Selecciona una editorial
                            </option>

                            <option th:each="publisher : ${publishers}"
                                    th:value="${publisher.id}"
                                    th:selected="${book?.publisher?.id == publisher.id}"
                                    th:text="${publisher.name}">
                                Editorial
                            </option>

                        </select>
                    </div>

                    <div class="col-12 col-md-4">
                        <label class="form-label" for="authorIds">Autores</label>

                        <select class="form-select"
                                id="authorIds"
                                name="authorIds"
                                multiple>

                            <option th:each="author : ${authors}"
                                    th:value="${author.id}"
                                    th:text="${author.name}">
                                Autor
                            </option>

                        </select>
                    </div>

                    <div class="col-12 col-md-4">
                        <label class="form-label" for="categoryIds">Categorías</label>

                        <select class="form-select"
                                id="categoryIds"
                                name="categoryIds"
                                multiple>

                            <option th:each="category : ${categories}"
                                    th:value="${category.id}"
                                    th:text="${category.name}">
                                Categoría
                            </option>

                        </select>
                    </div>

                </div>

                <div class="mt-3 d-flex gap-2">

                    <button class="btn btn-primary" type="submit">
                        <i class="bi bi-save me-1"></i>
                        Guardar
                    </button>

                    <a class="btn btn-outline-secondary"
                       th:href="@{/admin/books}">
                        Limpiar
                    </a>

                </div>

            </form>

        </section>

        <section class="bg-white border rounded-3">

            <div class="table-responsive">

                <table class="table table-striped align-middle mb-0">

                    <thead>
                    <tr>
                        <th>ISBN</th>
                        <th>Título</th>
                        <th>Autores</th>
                        <th>Categorías</th>
                        <th>Stock</th>
                        <th>Editorial</th>
                        <th class="text-end">Acciones</th>
                    </tr>
                    </thead>

                    <tbody>

                    <tr th:each="item : ${books}">

                        <td th:text="${item.isbn}">
                            ISBN
                        </td>

                        <td th:text="${item.title}">
                            Título
                        </td>

                        <td>
                                    <span th:each="author, st : ${item.author}"
                                          th:text="${author.name + (st.last ? '' : ', ')}">
                                    </span>
                        </td>

                        <td>
                                    <span th:each="category, st : ${item.category}"
                                          th:text="${category.name + (st.last ? '' : ', ')}">
                                    </span>
                        </td>

                        <td>
                                    <span class="badge"
                                          th:classappend="${item.stock > 0 ? ' text-bg-success' : ' text-bg-secondary'}"
                                          th:text="${item.stock}">
                                        0
                                    </span>
                        </td>

                        <td th:text="${item.publisher?.name}">
                            Editorial
                        </td>

                        <td class="text-end">

                            <a class="btn btn-sm btn-outline-primary"
                               th:href="@{/admin/books/edit(isbn=${item.isbn})}">
                                <i class="bi bi-pencil"></i>
                            </a>

                            <form class="d-inline"
                                  th:action="@{/admin/books/delete}"
                                  method="post">

                                <input type="hidden"
                                       th:if="${_csrf != null}"
                                       th:name="${_csrf.parameterName}"
                                       th:value="${_csrf.token}">

                                <input type="hidden"
                                       name="isbn"
                                       th:value="${item.isbn}">

                                <button class="btn btn-sm btn-outline-danger"
                                        type="submit"
                                        data-confirm="¿Eliminar este libro?">
                                    <i class="bi bi-trash"></i>
                                </button>

                            </form>

                        </td>

                    </tr>

                    <tr th:if="${#lists.isEmpty(books)}">
                        <td colspan="7"
                            class="text-center text-secondary py-4">
                            No hay libros registrados.
                        </td>
                    </tr>

                    </tbody>

                </table>

            </div>

        </section>

    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script th:src="@{/assets/js/codexlibrary.js}"
        src="/assets/js/codexlibrary.js">
</script>

</body>
</html>
