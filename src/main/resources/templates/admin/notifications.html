<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Notificaciones')}"></head>
<body>
<div class="app-shell">
    <nav th:replace="~{fragments/nav :: sidebar('notifications','admin')}"></nav>

    <main class="app-content p-3 p-lg-4">

        <h1 class="view-title mb-4">Notificaciones</h1>

        <div class="alert alert-info"
             th:if="${flash != null}"
             th:text="${flash}">
        </div>

        <section class="bg-white border rounded-3 p-3 mb-4">

            <form th:action="@{/admin/notifications/send}"
                  method="post"
                  class="needs-validation"
                  data-validate="true"
                  novalidate>

                <input type="hidden"
                       th:if="${_csrf != null}"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">

                <div class="row g-3">

                    <div class="col-12 col-md-4">

                        <label class="form-label">
                            Usuario
                        </label>

                        <select class="form-select"
                                name="userId"
                                required>

                            <option value="">
                                Selecciona un usuario
                            </option>

                            <option th:each="user : ${users}"
                                    th:value="${user.id}"
                                    th:text="${user.name}">
                            </option>

                        </select>

                    </div>

                    <div class="col-12 col-md-3">

                        <label class="form-label">
                            Tipo
                        </label>

                        <select class="form-select"
                                name="type"
                                required>

                            <option value="INFO">
                                Información
                            </option>

                            <option value="ALERTA">
                                Alerta
                            </option>

                            <option value="VENCIMIENTO">
                                Vencimiento
                            </option>

                        </select>

                    </div>

                    <div class="col-12">

                        <label class="form-label">
                            Mensaje
                        </label>

                        <textarea class="form-control"
                                  name="message"
                                  rows="3"
                                  required>
                            </textarea>

                    </div>

                </div>

                <button class="btn btn-primary mt-3" type="submit">
                    <i class="bi bi-send me-1"></i>
                    Enviar
                </button>

            </form>

        </section>

        <section class="bg-white border rounded-3">

            <div class="table-responsive">

                <table class="table table-striped mb-0">

                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Usuario</th>
                        <th>Tipo</th>
                        <th>Mensaje</th>
                        <th>Fecha</th>
                        <th>Estado</th>
                    </tr>
                    </thead>

                    <tbody>

                    <tr th:each="notification : ${notifications}">

                        <td th:text="${notification.id}"></td>

                        <td th:text="${notification.user?.name}"></td>

                        <td th:text="${notification.type}"></td>

                        <td th:text="${notification.message}"></td>

                        <td th:text="${notification.notificationDate != null ? #dates.format(notification.notificationDate,'yyyy-MM-dd HH:mm') : ''}"></td>

                        <td>

                                    <span class="badge"
                                          th:classappend="${notification.read ? ' text-bg-secondary' : ' text-bg-primary'}"
                                          th:text="${notification.read ? 'Leída' : 'Nueva'}">
                                    </span>

                        </td>

                    </tr>

                    <tr th:if="${#lists.isEmpty(notifications)}">

                        <td colspan="6"
                            class="text-center text-secondary py-4">
                            No hay notificaciones registradas.
                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </section>

    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script th:src="@{/assets/js/codexlibrary.js}"
        src="/assets/js/codexlibrary.js">
</script>

</body>
</html>
