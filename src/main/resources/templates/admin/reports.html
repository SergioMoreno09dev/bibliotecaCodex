<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Reportes')}"></head>
<body>
<div class="app-shell">
    <nav th:replace="~{fragments/nav :: sidebar('reports','admin')}"></nav>

    <main class="app-content p-3 p-lg-4">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-4">
            <h1 class="view-title mb-0">Reportes</h1>

            <form th:action="@{/admin/reports/summary}" method="post">
                <input type="hidden"
                       th:if="${_csrf != null}"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">

                <button class="btn btn-outline-primary" type="submit">
                    <i class="bi bi-magic me-1"></i>
                    Generar resumen
                </button>
            </form>
        </div>

        <div class="alert alert-info"
             th:if="${flash != null}"
             th:text="${flash}">
        </div>

        <section class="bg-white border rounded-3 p-3 mb-4">
            <form th:action="@{/admin/reports/save}"
                  method="post"
                  class="needs-validation"
                  data-validate="true"
                  novalidate>
                <input type="hidden"
                       th:if="${_csrf != null}"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">

                <input type="hidden" name="id" th:value="${report?.id}">

                <div class="row g-3">
                    <div class="col-12 col-md-8">
                        <label class="form-label">Titulo</label>
                        <input class="form-control"
                               name="title"
                               th:value="${report?.title}"
                               required>
                    </div>

                    <div class="col-12 col-md-4">
                        <label class="form-label">Tipo</label>
                        <input class="form-control"
                               name="type"
                               th:value="${report?.type}"
                               required>
                    </div>

                    <div class="col-12">
                        <label class="form-label">Contenido</label>
                        <textarea class="form-control"
                                  name="content"
                                  rows="5"
                                  th:text="${report?.content}"
                                  required></textarea>
                    </div>
                </div>

                <button class="btn btn-primary mt-3" type="submit">
                    <i class="bi bi-save me-1"></i>
                    Guardar
                </button>
            </form>
        </section>

        <section class="bg-white border rounded-3 mb-4">
            <div class="table-responsive">
                <table class="table table-striped mb-0">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Titulo</th>
                        <th>Tipo</th>
                        <th>Contenido</th>
                        <th class="text-end">Exportar</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="item : ${reports}">
                        <td th:text="${item.id}"></td>
                        <td th:text="${item.title}"></td>
                        <td th:text="${item.type}"></td>
                        <td th:text="${item.content}"></td>
                        <td class="text-end">
                            <form class="d-flex justify-content-end gap-2"
                                  th:action="@{/admin/reports/export}"
                                  method="post">
                                <input type="hidden"
                                       th:if="${_csrf != null}"
                                       th:name="${_csrf.parameterName}"
                                       th:value="${_csrf.token}">

                                <input type="hidden" name="id" th:value="${item.id}">

                                <input class="form-control form-control-sm"
                                       name="filters"
                                       placeholder="Filtros aplicados"
                                       style="max-width: 180px;">

                                <select class="form-select form-select-sm w-auto" name="format">
                                    <option value="CSV">CSV</option>
                                    <option value="TXT">TXT</option>
                                </select>

                                <button class="btn btn-sm btn-outline-primary" type="submit">
                                    <i class="bi bi-download"></i>
                                </button>
                            </form>
                        </td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(reports)}">
                        <td colspan="5" class="text-center text-secondary py-4">
                            No hay reportes registrados.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <section class="bg-white border rounded-3">
            <div class="p-3 border-bottom">
                <h2 class="h5 mb-0">Historial de exportaciones</h2>
            </div>

            <div class="table-responsive">
                <table class="table table-striped mb-0">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Reporte</th>
                        <th>Formato</th>
                        <th>Filtros</th>
                        <th>Fecha</th>
                        <th>Usuario</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="exportItem : ${exportRequests}">
                        <td th:text="${exportItem.id}"></td>
                        <td th:text="${exportItem.report?.title}"></td>
                        <td th:text="${exportItem.format}"></td>
                        <td th:text="${exportItem.appliedFilters}"></td>
                        <td th:text="${exportItem.exportDate != null ? #dates.format(exportItem.exportDate,'yyyy-MM-dd HH:mm') : ''}"></td>
                        <td th:text="${exportItem.user?.email}"></td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(exportRequests)}">
                        <td colspan="6" class="text-center text-secondary py-4">
                            No hay exportaciones registradas.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/assets/js/codexlibrary.js}" src="/assets/js/codexlibrary.js"></script>
</body>
</html>
