<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Panel de solicitudes')}"></head>
<body>
<div class="app-shell">
    <nav th:replace="~{fragments/nav :: sidebar('reports','admin')}"></nav>

    <main class="app-content p-3 p-lg-4">

        <h1 class="view-title mb-4">Panel de Solicitudes</h1>

        <section class="mb-4">
            <div class="row g-3">
                <div class="col-6 col-md-3">
                    <div class="card p-3 text-center">
                        <div class="h6">Total</div>
                        <div class="h3" th:text="${totalSolicitudes}">0</div>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="card p-3 text-center">
                        <div class="h6">Pendientes</div>
                        <div class="h3 text-warning" th:text="${pendientes}">0</div>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="card p-3 text-center">
                        <div class="h6">Aprobadas</div>
                        <div class="h3 text-success" th:text="${aprobadas}">0</div>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="card p-3 text-center">
                        <div class="h6">Rechazadas</div>
                        <div class="h3 text-danger" th:text="${rechazadas}">0</div>
                    </div>
                </div>
            </div>
        </section>

        <section class="bg-white border rounded-3 p-3">

            <div class="table-responsive">
                <table class="table table-striped mb-0">
                    <thead>
                    <tr>
                        <th>Solicitante</th>
                        <th>Tipo</th>
                        <th>Estado</th>
                        <th>Creación</th>
                        <th>Observación</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="s : ${solicitudes}">
                        <td th:text="${s.requester != null ? s.requester.name : ''}"></td>
                        <td th:text="${s.type}"></td>
                        <td>
                            <span class="badge"
                                  th:classappend="${s.state == 'pendiente' ? ' text-bg-warning' : (s.state == 'aprobada' ? ' text-bg-success' : ' text-bg-danger')}"
                                  th:text="${s.state}"></span>
                        </td>
                        <td th:text="${#dates.format(s.createdAt,'yyyy-MM-dd HH:mm')}"></td>
                        <td th:text="${s.observation}"></td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(solicitudes)}">
                        <td colspan="5" class="text-center text-secondary py-4">No hay solicitudes registradas.</td>
                    </tr>
                    </tbody>
                </table>
            </div>

        </section>

    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/assets/js/codexlibrary.js}" src="/assets/js/codexlibrary.js"></script>
</body>
</html>
