<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Editoriales')}"></head>
<body>
<div class="app-shell">
    <nav th:replace="~{fragments/nav :: sidebar('publishers','admin')}"></nav>

    <main class="app-content p-3 p-lg-4">

        <h1 class="view-title mb-4">Editoriales</h1>

        <div class="alert alert-info"
             th:if="${flash != null}"
             th:text="${flash}">
        </div>

        <section class="bg-white border rounded-3 p-3 mb-4">

            <form th:action="@{/admin/publishers/save}"
                  method="post"
                  class="needs-validation"
                  data-validate="true"
                  novalidate>

                <input type="hidden"
                       th:if="${_csrf != null}"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">

                <input type="hidden"
                       name="id"
                       th:value="${publisher?.id}">

                <div class="row g-3 align-items-end">

                    <div class="col-12 col-md-4">

                        <label class="form-label" for="name">
                            Nombre
                        </label>

                        <input class="form-control"
                               id="name"
                               name="name"
                               th:value="${publisher?.name}"
                               required>

                    </div>

                    <div class="col-12 col-md-3">

                        <label class="form-label" for="country">
                            Pa&iacute;s
                        </label>

                        <input class="form-control"
                               id="country"
                               name="country"
                               th:value="${publisher?.country}">

                    </div>

                    <div class="col-12 col-md-3">

                        <label class="form-label" for="foundingYear">
                            Fundaci&oacute;n
                        </label>

                        <input class="form-control"
                               id="foundingYear"
                               type="date"
                               name="foundingYear"
                               th:value="${publisher?.foundingYear != null ? #dates.format(publisher.foundingYear,'yyyy-MM-dd') : ''}">

                    </div>

                    <div class="col-12 col-md-2">

                        <button class="btn btn-primary w-100" type="submit">
                            <i class="bi bi-save me-1"></i>
                            Guardar
                        </button>

                    </div>

                </div>

            </form>

        </section>

        <section class="bg-white border rounded-3">

            <div class="table-responsive">

                <table class="table table-striped mb-0">

                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Pa&iacute;s</th>
                        <th>Fundaci&oacute;n</th>
                        <th class="text-end">Acciones</th>
                    </tr>
                    </thead>

                    <tbody>

                    <tr th:each="item : ${publishers}">

                        <td th:text="${item.id}"></td>

                        <td th:text="${item.name}"></td>

                        <td th:text="${item.country}"></td>

                        <td th:text="${item.foundingYear != null ? #dates.format(item.foundingYear,'yyyy-MM-dd') : ''}"></td>

                        <td class="text-end">

                            <a class="btn btn-sm btn-outline-primary"
                               th:href="@{/admin/publishers/edit(id=${item.id})}">
                                <i class="bi bi-pencil"></i>
                            </a>

                            <form class="d-inline"
                                  th:action="@{/admin/publishers/delete}"
                                  method="post">

                                <input type="hidden"
                                       th:if="${_csrf != null}"
                                       th:name="${_csrf.parameterName}"
                                       th:value="${_csrf.token}">

                                <input type="hidden"
                                       name="id"
                                       th:value="${item.id}">

                                <button class="btn btn-sm btn-outline-danger"
                                        type="submit"
                                        data-confirm="&iquest;Eliminar este registro?">
                                    <i class="bi bi-trash"></i>
                                </button>

                            </form>

                        </td>

                    </tr>

                    <tr th:if="${#lists.isEmpty(publishers)}">

                        <td colspan="6"
                            class="text-center text-secondary py-4">
                            No hay registros.
                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </section>

    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script th:src="@{/assets/js/codexlibrary.js}"
        src="/assets/js/codexlibrary.js">
</script>

</body>
</html>
