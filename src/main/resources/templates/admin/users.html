<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Usuarios')}"></head>
<body>
<div class="app-shell">
    <nav th:replace="~{fragments/nav :: sidebar('users','admin')}"></nav>

    <main class="app-content p-3 p-lg-4">

        <h1 class="view-title mb-4">
            Usuarios
        </h1>

        <div class="alert alert-info"
             th:if="${flash != null}"
             th:text="${flash}">
        </div>

        <section class="bg-white border rounded-3 p-3 mb-4">

            <form th:action="@{/admin/users/save}"
                  method="post"
                  class="needs-validation"
                  data-validate="true"
                  novalidate>

                <input type="hidden"
                       th:if="${_csrf != null}"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">

                <input type="hidden"
                       name="id"
                       th:value="${user?.id}">

                <div class="row g-3">

                    <div class="col-12 col-md-4">

                        <label class="form-label">
                            Nombre
                        </label>

                        <input class="form-control"
                               name="name"
                               th:value="${user?.name}"
                               required>

                    </div>

                    <div class="col-12 col-md-4">

                        <label class="form-label">
                            Correo
                        </label>

                        <input class="form-control"
                               type="email"
                               name="email"
                               th:value="${user?.email}"
                               required>

                    </div>

                    <div class="col-12 col-md-2">

                        <label class="form-label">
                            Rol
                        </label>

                        <select class="form-select"
                                name="rol"
                                required>

                            <option value="LECTOR"
                                    th:selected="${user?.rol == 'LECTOR'}">
                                Lector
                            </option>

                            <option value="ADMIN"
                                    th:selected="${user?.rol == 'ADMIN'}">
                                Administrador
                            </option>

                        </select>

                    </div>

                    <div class="col-12 col-md-2">

                        <label class="form-label">
                            Contraseña
                        </label>

                        <input class="form-control"
                               type="password"
                               name="password"
                               autocomplete="new-password">

                    </div>

                </div>

                <button class="btn btn-primary mt-3" type="submit">
                    <i class="bi bi-save me-1"></i>
                    Guardar
                </button>

            </form>

        </section>

        <section class="bg-white border rounded-3">

            <div class="table-responsive">

                <table class="table table-striped mb-0">

                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Correo</th>
                        <th>Rol</th>
                        <th class="text-end">Acciones</th>
                    </tr>
                    </thead>

                    <tbody>

                    <tr th:each="item : ${users}">

                        <td th:text="${item.id}"></td>

                        <td th:text="${item.name}"></td>

                        <td th:text="${item.email}"></td>

                        <td>

                                    <span class="badge"
                                          th:classappend="${item.rol == 'ADMIN' ? ' text-bg-primary' : ' text-bg-secondary'}"
                                          th:text="${item.rol}">
                                    </span>

                        </td>

                        <td class="text-end">

                            <a class="btn btn-sm btn-outline-primary"
                               th:href="@{/admin/users/edit(id=${item.id})}">
                                <i class="bi bi-pencil"></i>
                            </a>

                            <form class="d-inline"
                                  th:action="@{/admin/users/delete}"
                                  method="post">

                                <input type="hidden"
                                       th:if="${_csrf != null}"
                                       th:name="${_csrf.parameterName}"
                                       th:value="${_csrf.token}">

                                <input type="hidden"
                                       name="id"
                                       th:value="${item.id}">

                                <button class="btn btn-sm btn-outline-danger"
                                        type="submit"
                                        data-confirm="¿Eliminar este usuario?">
                                    <i class="bi bi-trash"></i>
                                </button>

                            </form>

                        </td>

                    </tr>

                    <tr th:if="${#lists.isEmpty(users)}">

                        <td colspan="5"
                            class="text-center text-secondary py-4">
                            No hay usuarios registrados.
                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </section>

    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script th:src="@{/assets/js/codexlibrary.js}"
        src="/assets/js/codexlibrary.js">
</script>

</body>
</html>
