<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Permisos')}"></head>
<body>
<div class="app-shell">
    <nav th:replace="~{fragments/nav :: sidebar('permissions','admin')}"></nav>

    <main class="app-content p-3 p-lg-4">

        <h1 class="view-title mb-4">Permisos</h1>

        <div class="alert alert-info"
             th:if="${flash != null}"
             th:text="${flash}">
        </div>

        <section class="bg-white border rounded-3 p-3 mb-4">

            <form th:action="@{/admin/permissions/save}"
                  method="post"
                  class="needs-validation"
                  data-validate="true"
                  novalidate>

                <input type="hidden"
                       th:if="${_csrf != null}"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">

                <input type="hidden"
                       name="id"
                       th:value="${permission?.id}">

                <div class="row g-3 align-items-end">

                    <div class="col-12 col-md-3">

                        <label class="form-label">
                            Rol
                        </label>

                        <select class="form-select"
                                name="role"
                                required>

                            <option value="ADMIN"
                                    th:selected="${permission?.role == 'ADMIN'}">
                                Administrador
                            </option>

                            <option value="LECTOR"
                                    th:selected="${permission?.role == 'LECTOR'}">
                                Lector
                            </option>

                        </select>

                    </div>

                    <div class="col-12 col-md-4">

                        <label class="form-label">
                            Permiso
                        </label>

                        <input class="form-control"
                               name="name"
                               th:value="${permission?.name}"
                               required>

                    </div>

                    <div class="col-12 col-md-3">

                        <label class="form-label">
                            Descripción
                        </label>

                        <input class="form-control"
                               name="description"
                               th:value="${permission?.description}">

                    </div>

                    <div class="col-12 col-md-2">

                        <button class="btn btn-primary w-100" type="submit">
                            <i class="bi bi-save me-1"></i>
                            Guardar
                        </button>

                    </div>

                </div>

            </form>

        </section>

        <section class="bg-white border rounded-3">

            <div class="table-responsive">

                <table class="table table-striped mb-0">

                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Rol</th>
                        <th>Permiso</th>
                        <th>Descripción</th>
                    </tr>
                    </thead>

                    <tbody>

                    <tr th:each="item : ${permissions}">

                        <td th:text="${item.id}"></td>

                        <td>

                                    <span class="badge"
                                          th:classappend="${item.role == 'ADMIN' ? ' text-bg-primary' : ' text-bg-secondary'}"
                                          th:text="${item.role}">
                                    </span>

                        </td>

                        <td th:text="${item.name}"></td>

                        <td th:text="${item.description}"></td>

                    </tr>

                    <tr th:if="${#lists.isEmpty(permissions)}">

                        <td colspan="4"
                            class="text-center text-secondary py-4">
                            No hay permisos registrados.
                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </section>

    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script th:src="@{/assets/js/codexlibrary.js}"
        src="/assets/js/codexlibrary.js">
</script>

</body>
</html>
