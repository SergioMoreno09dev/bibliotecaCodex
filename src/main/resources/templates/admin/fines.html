<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Multas')}"></head>
<body>
<div class="app-shell">
    <nav th:replace="~{fragments/nav :: sidebar('fines','admin')}"></nav>

    <main class="app-content p-3 p-lg-4">

        <h1 class="view-title mb-4">Multas</h1>

        <div class="alert alert-info"
             th:if="${flash != null}"
             th:text="${flash}">
        </div>

        <section class="bg-white border rounded-3 p-3 mb-4">

            <form th:action="@{/admin/fines/generate}"
                  method="post"
                  class="needs-validation"
                  data-validate="true"
                  novalidate>

                <input type="hidden"
                       th:if="${_csrf != null}"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">

                <div class="row g-3 align-items-end">

                    <div class="col-12 col-md-6">

                        <label class="form-label">
                            Préstamo
                        </label>

                        <select class="form-select"
                                name="loanId"
                                required>

                            <option value="">
                                Selecciona un préstamo
                            </option>

                            <option th:each="loan : ${loans}"
                                    th:value="${loan.id}"
                                    th:text="${'#' + loan.id + ' - ' + loan.user?.name + ' - ' + loan.book?.title}">
                            </option>

                        </select>

                    </div>

                    <div class="col-12 col-md-4">

                        <label class="form-label">
                            Valor
                        </label>

                        <input class="form-control"
                               type="number"
                               step="0.01"
                               min="0"
                               name="amount"
                               required>

                    </div>

                    <div class="col-12 col-md-2">

                        <button class="btn btn-primary w-100" type="submit">
                            <i class="bi bi-plus-lg me-1"></i>
                            Generar
                        </button>

                    </div>

                </div>

            </form>

        </section>

        <section class="bg-white border rounded-3">

            <div class="table-responsive">

                <table class="table table-striped mb-0">

                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Lector</th>
                        <th>Préstamo</th>
                        <th>Fecha</th>
                        <th>Valor</th>
                        <th>Estado</th>
                        <th class="text-end">Acciones</th>
                    </tr>
                    </thead>

                    <tbody>

                    <tr th:each="fine : ${fines}">

                        <td th:text="${fine.id}"></td>

                        <td th:text="${fine.user?.name}"></td>

                        <td th:text="${'#' + fine.loan?.id}"></td>

                        <td th:text="${fine.generateDate != null ? #dates.format(fine.generateDate,'yyyy-MM-dd') : ''}"></td>

                        <td th:text="${#numbers.formatDecimal(fine.amount,1,2)}"></td>

                        <td>
                                    <span class="badge"
                                          th:classappend="${fine.status == 'PAGADA' ? ' text-bg-success' : ' text-bg-warning'}"
                                          th:text="${fine.status}">
                                    </span>
                        </td>

                        <td class="text-end">

                            <form th:action="@{/admin/fines/pay}"
                                  method="post">

                                <input type="hidden"
                                       th:if="${_csrf != null}"
                                       th:name="${_csrf.parameterName}"
                                       th:value="${_csrf.token}">

                                <input type="hidden"
                                       name="id"
                                       th:value="${fine.id}">

                                <button class="btn btn-sm btn-outline-success"
                                        type="submit">
                                    <i class="bi bi-check2-circle"></i>
                                </button>

                            </form>

                        </td>

                    </tr>

                    <tr th:if="${#lists.isEmpty(fines)}">

                        <td colspan="7"
                            class="text-center text-secondary py-4">
                            No hay multas registradas.
                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </section>

    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script th:src="@{/assets/js/codexlibrary.js}"
        src="/assets/js/codexlibrary.js">
</script>

</body>
</html>
