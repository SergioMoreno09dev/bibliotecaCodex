<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Reseñas')}"></head>
<body>
<div class="app-shell">
    <nav th:replace="~{fragments/nav :: sidebar('reviews','admin')}"></nav>

    <main class="app-content p-3 p-lg-4">

        <h1 class="view-title mb-4">
            Reseñas
        </h1>

        <section class="bg-white border rounded-3">

            <div class="table-responsive">

                <table class="table table-striped mb-0">

                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Libro</th>
                        <th>Lector</th>
                        <th>Calificación</th>
                        <th>Comentario</th>
                        <th>Fecha</th>
                        <th class="text-end">Acciones</th>
                    </tr>
                    </thead>

                    <tbody>

                    <tr th:each="review : ${reviews}">

                        <td th:text="${review.id}"></td>

                        <td th:text="${review.book?.title}"></td>

                        <td th:text="${review.user?.name}"></td>

                        <td>

                                    <span class="badge text-bg-primary"
                                          th:text="${review.rating + '/5'}">
                                    </span>

                        </td>

                        <td th:text="${review.comment}"></td>

                        <td th:text="${review.reviewDate != null ? #dates.format(review.reviewDate,'yyyy-MM-dd') : ''}"></td>

                        <td class="text-end">

                            <form th:action="@{/admin/reviews/delete}"
                                  method="post">

                                <input type="hidden"
                                       th:if="${_csrf != null}"
                                       th:name="${_csrf.parameterName}"
                                       th:value="${_csrf.token}">

                                <input type="hidden"
                                       name="id"
                                       th:value="${review.id}">

                                <button class="btn btn-sm btn-outline-danger"
                                        type="submit"
                                        data-confirm="¿Eliminar esta reseña?">
                                    <i class="bi bi-trash"></i>
                                </button>

                            </form>

                        </td>

                    </tr>

                    <tr th:if="${#lists.isEmpty(reviews)}">

                        <td colspan="7"
                            class="text-center text-secondary py-4">
                            No hay reseñas registradas.
                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </section>

    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script th:src="@{/assets/js/codexlibrary.js}"
        src="/assets/js/codexlibrary.js">
</script>

</body>
</html>
