<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Préstamos')}"></head>
<body>
<div class="app-shell">
    <nav th:replace="~{fragments/nav :: sidebar('loans','admin')}"></nav>

    <main class="app-content p-3 p-lg-4">

        <h1 class="view-title mb-4">Préstamos</h1>

        <div class="alert alert-info"
             th:if="${flash != null}"
             th:text="${flash}">
        </div>

        <section class="bg-white border rounded-3 p-3 mb-4">

            <h2 class="h5 mb-3">
                Nuevo préstamo
            </h2>

            <form th:action="@{/admin/loans/create}"
                  method="post"
                  class="needs-validation"
                  data-validate="true"
                  novalidate>

                <input type="hidden"
                       th:if="${_csrf != null}"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">

                <div class="row g-3 align-items-end">

                    <div class="col-12 col-md-4">

                        <label class="form-label" for="userId">
                            Lector
                        </label>

                        <select class="form-select"
                                id="userId"
                                name="userId"
                                required>

                            <option value="">
                                Selecciona un lector
                            </option>

                            <option th:each="user : ${users}"
                                    th:value="${user.id}"
                                    th:text="${user.name + ' - ' + user.email}">
                            </option>

                        </select>

                    </div>

                    <div class="col-12 col-md-4">

                        <label class="form-label" for="isbn">
                            Libro
                        </label>

                        <select class="form-select"
                                id="isbn"
                                name="isbn"
                                required>

                            <option value="">
                                Selecciona un libro
                            </option>

                            <option th:each="book : ${books}"
                                    th:value="${book.isbn}"
                                    th:text="${book.title + ' (' + book.stock + ')'}">
                            </option>

                        </select>

                    </div>

                    <div class="col-12 col-md-3">

                        <label class="form-label" for="returnDate">
                            Fecha de devolución
                        </label>

                        <input class="form-control"
                               type="date"
                               id="returnDate"
                               name="returnDate"
                               required>

                    </div>

                    <div class="col-12 col-md-1">

                        <button class="btn btn-primary w-100" type="submit">
                            <i class="bi bi-plus-lg"></i>
                        </button>

                    </div>

                </div>

            </form>

        </section>

        <section class="bg-white border rounded-3">

            <div class="table-responsive">

                <table class="table table-striped mb-0">

                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Lector</th>
                        <th>Libro</th>
                        <th>Préstamo</th>
                        <th>Devolución</th>
                        <th>Estado</th>
                        <th class="text-end">Acciones</th>
                    </tr>
                    </thead>

                    <tbody>

                    <tr th:each="loan : ${loans}"
                        th:classappend="${loan.status == 'VENCIDO' or loan.status == 'EXPIRADO'} ? ' row-expired'">

                        <td th:text="${loan.id}"></td>

                        <td th:text="${loan.user?.name}"></td>

                        <td th:text="${loan.book?.title}"></td>

                        <td th:text="${loan.loanDate != null ? #dates.format(loan.loanDate,'yyyy-MM-dd') : ''}"></td>

                        <td th:text="${loan.returnDate != null ? #dates.format(loan.returnDate,'yyyy-MM-dd') : ''}"></td>

                        <td>

                                    <span class="badge"
                                          th:classappend="${loan.status == 'VENCIDO' or loan.status == 'EXPIRADO' ? ' text-bg-danger' : loan.status == 'ACTIVO' ? ' text-bg-success' : ' text-bg-secondary'}"
                                          th:text="${loan.status}">
                                    </span>

                        </td>

                        <td class="text-end">

                            <form class="d-inline"
                                  th:action="@{/admin/loans/close}"
                                  method="post">

                                <input type="hidden"
                                       th:if="${_csrf != null}"
                                       th:name="${_csrf.parameterName}"
                                       th:value="${_csrf.token}">

                                <input type="hidden"
                                       name="id"
                                       th:value="${loan.id}">

                                <button class="btn btn-sm btn-outline-success"
                                        type="submit">
                                    <i class="bi bi-check2"></i>
                                </button>

                            </form>

                            <form class="d-inline"
                                  th:action="@{/admin/loans/extend}"
                                  method="post">

                                <input type="hidden"
                                       th:if="${_csrf != null}"
                                       th:name="${_csrf.parameterName}"
                                       th:value="${_csrf.token}">

                                <input type="hidden"
                                       name="id"
                                       th:value="${loan.id}">

                                <button class="btn btn-sm btn-outline-primary"
                                        type="submit">
                                    <i class="bi bi-calendar-plus"></i>
                                </button>

                            </form>

                        </td>

                    </tr>

                    <tr th:if="${#lists.isEmpty(loans)}">

                        <td colspan="7"
                            class="text-center text-secondary py-4">
                            No hay préstamos registrados.
                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </section>

    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script th:src="@{/assets/js/codexlibrary.js}"
        src="/assets/js/codexlibrary.js">
</script>

</body>
</html>
