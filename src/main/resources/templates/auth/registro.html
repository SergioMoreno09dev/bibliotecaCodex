<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Registro')}"></head>

<body>

<main class="min-vh-100 d-flex align-items-center justify-content-center p-3">

    <section class="auth-panel bg-white border rounded-3 shadow-sm p-4 p-sm-5">

        <div class="mb-4">

            <div class="d-inline-flex align-items-center justify-content-center bg-primary text-white rounded-2 p-2 mb-3">
                <i class="bi bi-person-plus fs-4"></i>
            </div>

            <h1 class="h3 mb-1">
                Crear cuenta
            </h1>

            <p class="text-secondary mb-0">
                Registro de usuario en CodexLibrary
            </p>

        </div>

        <div class="alert alert-info"
             th:if="${flash != null}"
             th:text="${flash}">
            Mensaje
        </div>

        <form th:action="@{/registro}"
              th:object="${user}"
              method="post"
              class="needs-validation"
              data-validate="true"
              novalidate>

            <input type="hidden"
                   th:if="${_csrf != null}"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}">

            <div class="mb-3">

                <label for="name"
                       class="form-label">
                    Nombre completo
                </label>

                <input id="name"
                       type="text"
                       th:field="*{name}"
                       class="form-control"
                       maxlength="120"
                       required>

                <div class="invalid-feedback">
                    El nombre es obligatorio.
                </div>

                <div class="text-danger small form-error"
                     th:text="${errors?.name}">
                </div>

            </div>

            <div class="mb-3">

                <label for="email"
                       class="form-label">
                    Correo electrónico
                </label>

                <input id="email"
                       type="email"
                       th:field="*{email}"
                       class="form-control"
                       autocomplete="email"
                       required>

                <div class="invalid-feedback">
                    Ingresa un correo válido.
                </div>

                <div class="text-danger small form-error"
                     th:text="${errors?.email}">
                </div>

            </div>

            <div class="mb-3">

                <label for="password"
                       class="form-label">
                    Contraseña
                </label>

                <input id="password"
                       type="password"
                       th:field="*{password}"
                       class="form-control"
                       autocomplete="new-password"
                       minlength="8"
                       required>

                <div class="invalid-feedback">
                    Usa al menos 8 caracteres.
                </div>

                <div class="text-danger small form-error"
                     th:text="${errors?.password}">
                </div>

            </div>

            <button type="submit"
                    class="btn btn-primary w-100">
                <i class="bi bi-check2-circle me-1"></i>
                Registrarse
            </button>

        </form>

        <p class="mt-4 mb-0 text-center">

            <a th:href="@{/login}">
                Volver al inicio de sesión
            </a>

        </p>

    </section>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script th:src="@{/assets/js/codexlibrary.js}"
        src="/assets/js/codexlibrary.js">
</script>

</body>
</html>
