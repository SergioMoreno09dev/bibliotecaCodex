<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Iniciar sesión')}"></head>

<body>

<main class="min-vh-100 d-flex align-items-center justify-content-center p-3">

    <section class="auth-panel bg-white border rounded-3 shadow-sm p-4 p-sm-5">

        <div class="mb-4">

            <div class="d-inline-flex align-items-center justify-content-center bg-primary text-white rounded-2 p-2 mb-3">
                <i class="bi bi-journal-bookmark fs-4"></i>
            </div>

            <h1 class="h3 mb-1">
                CodexLibrary
            </h1>

            <p class="text-secondary mb-0">
                Acceso al sistema de biblioteca
            </p>

        </div>

        <div class="alert alert-danger"
             th:if="${param.error}">
            Correo o contraseña incorrectos.
        </div>

        <div class="alert alert-success"
             th:if="${param.logout}">
            Sesión cerrada correctamente.
        </div>

        <div class="alert alert-info"
             th:if="${flash != null}"
             th:text="${flash}">
            Mensaje
        </div>

        <form th:action="@{/login}"
              method="post"
              class="needs-validation"
              data-validate="true"
              novalidate>

            <input type="hidden"
                   th:if="${_csrf != null}"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}">

            <div class="mb-3">

                <label for="username"
                       class="form-label">
                    Correo electrónico
                </label>

                <input id="username"
                       type="email"
                       name="username"
                       class="form-control"
                       autocomplete="email"
                       required>

                <div class="invalid-feedback">
                    Ingresa un correo válido.
                </div>

            </div>

            <div class="mb-3">

                <label for="password"
                       class="form-label">
                    Contraseña
                </label>

                <input id="password"
                       type="password"
                       name="password"
                       class="form-control"
                       autocomplete="current-password"
                       required>

                <div class="invalid-feedback">
                    La contraseña es obligatoria.
                </div>

            </div>

            <button type="submit"
                    class="btn btn-primary w-100">
                <i class="bi bi-box-arrow-in-right me-1"></i>
                Ingresar
            </button>

        </form>

        <p class="mt-4 mb-0 text-center">
            ¿No tienes cuenta?
            <a th:href="@{/registro}">
                Regístrate
            </a>
        </p>

    </section>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script th:src="@{/assets/js/codexlibrary.js}"
        src="/assets/js/codexlibrary.js">
</script>

</body>
</html>
