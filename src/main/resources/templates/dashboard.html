<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Panel')}"></head>

<body>

<div class="app-shell">

    <nav th:replace="~{fragments/nav :: sidebar('dashboard','admin')}"></nav>

    <main class="app-content p-3 p-lg-4">

        <div class="d-flex flex-wrap align-items-center justify-content-between gap-3 mb-4">

            <div>

                <h1 class="view-title mb-1">
                    Panel principal
                </h1>

                <p class="text-secondary mb-0">
                    Resumen operativo de la biblioteca
                </p>

            </div>

            <form th:action="@{/logout}"
                  method="post">

                <input type="hidden"
                       th:if="${_csrf != null}"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">

                <button class="btn btn-outline-secondary"
                        type="submit">

                    <i class="bi bi-box-arrow-right me-1"></i>
                    Cerrar sesión

                </button>

            </form>

        </div>

        <div class="alert alert-info"
             th:if="${flash != null}"
             th:text="${flash}">
        </div>

        <div class="row g-3">

            <div class="col-12 col-md-6 col-xl-3">

                <div class="card metric-card shadow-sm">

                    <div class="card-body">

                        <div class="text-secondary small">
                            Libros registrados
                        </div>

                        <div class="display-6 fw-semibold"
                             th:text="${totalBooks ?: 0}">
                            0
                        </div>

                    </div>

                </div>

            </div>

            <div class="col-12 col-md-6 col-xl-3">

                <div class="card metric-card shadow-sm">

                    <div class="card-body">

                        <div class="text-secondary small">
                            Préstamos activos
                        </div>

                        <div class="display-6 fw-semibold"
                             th:text="${activeLoans ?: 0}">
                            0
                        </div>

                    </div>

                </div>

            </div>

            <div class="col-12 col-md-6 col-xl-3">

                <div class="card metric-card shadow-sm">

                    <div class="card-body">

                        <div class="text-secondary small">
                            Usuarios
                        </div>

                        <div class="display-6 fw-semibold"
                             th:text="${totalUsers ?: 0}">
                            0
                        </div>

                    </div>

                </div>

            </div>

            <div class="col-12 col-md-6 col-xl-3">

                <div class="card metric-card shadow-sm border-danger">

                    <div class="card-body">

                        <div class="text-secondary small">
                            Préstamos vencidos
                        </div>

                        <div class="display-6 fw-semibold text-danger"
                             th:text="${expiredLoans ?: 0}">
                            0
                        </div>

                    </div>

                </div>

            </div>

        </div>

    </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script th:src="@{/assets/js/codexlibrary.js}"
        src="/assets/js/codexlibrary.js">
</script>

</body>
</html>
