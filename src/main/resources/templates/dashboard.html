<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Panel')}"></head>

<body>

<div class="app-shell">

    <nav th:replace="~{fragments/nav :: sidebar('dashboard','admin')}"></nav>

    <main class="app-content p-3 p-lg-4">

        <div class="d-flex flex-wrap align-items-center justify-content-between gap-3 mb-4">

            <div>

                <h1 class="view-title mb-1">
                    Panel principal
                </h1>

                <p class="text-secondary mb-0">
                    Resumen operativo de la biblioteca
                </p>

            </div>

        </div>

        <div class="alert alert-info"
             th:if="${flash != null}"
             th:text="${flash}">
        </div>

        <div class="row g-3">

            <div class="col-12 col-md-6 col-xl-3">

                <div class="card metric-card metric-primary shadow-sm">

                    <div class="card-body">

                        <div class="d-flex justify-content-between align-items-start gap-3">

                            <div>

                                <div class="text-secondary small">
                                    Libros registrados
                                </div>

                                <div class="display-6 fw-semibold"
                                     th:text="${totalBooks ?: 0}">
                                    0
                                </div>

                            </div>

                            <span class="metric-icon">
                                <i class="bi bi-book"></i>
                            </span>

                        </div>

                    </div>

                </div>

            </div>

            <div class="col-12 col-md-6 col-xl-3">

                <div class="card metric-card metric-success shadow-sm">

                    <div class="card-body">

                        <div class="d-flex justify-content-between align-items-start gap-3">

                            <div>

                                <div class="text-secondary small">
                                    Pr&eacute;stamos activos
                                </div>

                                <div class="display-6 fw-semibold"
                                     th:text="${activeLoans ?: 0}">
                                    0
                                </div>

                            </div>

                            <span class="metric-icon">
                                <i class="bi bi-arrow-left-right"></i>
                            </span>

                        </div>

                    </div>

                </div>

            </div>

            <div class="col-12 col-md-6 col-xl-3">

                <div class="card metric-card metric-info shadow-sm">

                    <div class="card-body">

                        <div class="d-flex justify-content-between align-items-start gap-3">

                            <div>

                                <div class="text-secondary small">
                                    Usuarios
                                </div>

                                <div class="display-6 fw-semibold"
                                     th:text="${totalUsers ?: 0}">
                                    0
                                </div>

                            </div>

                            <span class="metric-icon">
                                <i class="bi bi-people"></i>
                            </span>

                        </div>

                    </div>

                </div>

            </div>

            <div class="col-12 col-md-6 col-xl-3">

                <div class="card metric-card metric-danger shadow-sm">

                    <div class="card-body">

                        <div class="d-flex justify-content-between align-items-start gap-3">

                            <div>

                                <div class="text-secondary small">
                                    Pr&eacute;stamos vencidos
                                </div>

                                <div class="display-6 fw-semibold text-danger"
                                     th:text="${expiredLoans ?: 0}">
                                    0
                                </div>

                            </div>

                            <span class="metric-icon">
                                <i class="bi bi-exclamation-triangle"></i>
                            </span>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script th:src="@{/assets/js/codexlibrary.js}"
        src="/assets/js/codexlibrary.js">
</script>

</body>
</html>
