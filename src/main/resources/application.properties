spring.application.name=biblio

spring.datasource.url=jdbc:mysql://localhost:3306/biblioteca_db?useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true
spring.datasource.username=biblioteca_user
spring.datasource.password=biblioteca123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.thymeleaf.cache=false
spring.thymeleaf.enabled=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

server.port=8082

# Real email delivery requires a valid SMTP sender account.
# Keep this disabled for local tests unless SMTP credentials are configured.
codexlibrary.mail.enabled=false
codexlibrary.mail.from=CodexLibrary <no-reply@codexlibrary.local>

